# ── ServiceAccount — feature-service ─────────────────────
# MSK read access only (consumer, no S3 write).
#
#   eksctl create iamserviceaccount \
#     --cluster analytics-cluster \
#     --namespace analytics \
#     --name feature-service \
#     --role-name feature-service-role \
#     --attach-policy-arn arn:aws:iam::381492045894:policy/ingestion-msk-policy \
#     --approve
apiVersion: v1
kind: ServiceAccount
metadata:
  name: feature-service
  namespace: analytics
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::381492045894:role/feature-service-role
