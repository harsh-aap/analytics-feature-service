# ── HorizontalPodAutoscaler — feature-service ─────────────
# maxReplicas = num.partitions (12) — Kafka partition count is
# the ceiling for useful consumer parallelism.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feature-service
  namespace: analytics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feature-service
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type:          Pods
          value:         2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 120
